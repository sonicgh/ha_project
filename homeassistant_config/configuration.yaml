# Home Assistant Configuration

# HTTP - API and CORS settings
http:
  cors_allowed_origins:
    - http://localhost:3000  # Replace with your Alpine.js/HTMX frontend URL

# Recorder - PostgreSQL database
recorder:
  db_url: postgresql://homeassistant:hass_password@ha-postgres:5432/homeassistant
  purge_keep_days: 30
  include:
    domains:
      - light
      - switch
      - sensor
      - binary_sensor
  exclude:
    entities:
      - sun.sun
      - zone.home

# Enable the history and logbook integration
history:

logbook: